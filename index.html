<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <!-- Astronomy Picture of the Day Section -->
    <h2 class="section-title">Astronomy Picture of the Day</h2>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="apod-btn">Get Space Images</button>
    </div>

    <div id="space-fact" class="space-fact">
      <h3 class="space-fact-title">Did You Know?</h3>
      <p id="space-fact-text" class="space-fact-text"></p>
    </div>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>

    <!-- Near Earth Objects Section -->
    <h2 class="section-title">Near Earth Objects</h2>

    <div class="filters">
      <input type="date" id="neoStartDate" />
      <input type="date" id="neoEndDate" />
      <button id="neo-search-btn">Search Asteroids</button>
    </div>

    <div id="neo-gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">☄️</div>
        <p>Select a date range and click "Search Asteroids" to find near Earth objects!</p>
      </div>
    </div>
  </div>

  <!-- Lightbox modal for enlarged images -->
  <div id="modal" class="modal-overlay">
    <div class="modal-content">
      <button id="modal-close" class="modal-close">✕</button>
      <!-- Shown for image entries -->
      <img id="modal-img" src="" alt="" class="modal-img" />
      <!-- Shown for video entries -->
      <div id="modal-video" class="modal-video-wrapper"></div>
      <p id="modal-title" class="modal-title"></p>
      <p id="modal-date" class="modal-date"></p>
      <p id="modal-explanation" class="modal-explanation"></p>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
  <script src="js/asteroids.js"></script>
</body>
</html>
